<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Title - MOST IMPORTANT -->
    <title>Alexiphones | Premium iPhones in South Africa</title>
    
    <!-- Meta Description -->
    <meta name="description" content="Alexiphones offers quality brand new and pre-owned iPhones in South Africa. Shop trusted Apple devices at competitive prices. Visit alexiphones.co.za today." />
    
    <!-- Keywords (optional but helpful) -->
    <meta name="keywords" content="Alexiphones, iPhones South Africa, buy iPhone, pre-owned iPhone, new iPhone, Apple phones" />
    
    <!-- Open Graph (for social media sharing) -->
    <meta property="og:title" content="Alexiphones | Premium iPhones in South Africa" />
    <meta property="og:description" content="Quality brand new and pre-owned iPhones in South Africa" />
    <meta property="og:url" content="https://www.alexiphones.co.za" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Alexiphones" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alexiphones | Premium iPhones in South Africa" />
    <meta name="twitter:description" content="Quality brand new and pre-owned iPhones in South Africa" />
    
    <meta name="author" content="Alexiphones" />
    <meta property="og:image" content="/photo_2025-08-23_19-46-21(2).jpg" />
    <meta name="twitter:image" content="/photo_2025-08-23_19-46-21(2).jpg" />
    <!-- Yoco Checkout API v2 - redirect-based, no client SDK needed -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Alexiphones",
      "url": "https://www.alexiphones.co.za",
      "description": "Quality brand new and pre-owned iPhones in South Africa",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "ZA"
      },
      "priceRange": "$$"
    }
    </script>
  </body>
</html>
